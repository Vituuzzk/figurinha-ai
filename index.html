<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>FigurinAI</title>

<style>
body {
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
  font-family: Arial;
  text-align: center;
  padding: 30px;
}

h1 {
  font-size: 28px;
}

#drop {
  border: 2px dashed #555;
  border-radius: 20px;
  padding: 50px;
  margin-top: 20px;
  cursor: pointer;
  transition: 0.3s;
}

#drop:hover {
  border-color: #00ff88;
  background: rgba(0,255,136,0.05);
}

button {
  margin-top: 20px;
  padding: 12px 25px;
  background: #00ff88;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

img {
  margin-top: 20px;
  max-width: 250px;
}

#loading {
  display: none;
  margin-top: 15px;
}
</style>

</head>
<body>

<h1>🤖 FigurinAI</h1>
<p>Arraste ou clique para criar sua figurinha</p>

<div id="drop">📂 Arraste sua imagem aqui</div>
<input type="file" id="file" hidden>

<button onclick="criarFigurinha()">Criar Figurinha</button>

<div id="loading">⏳ Criando...</div>

<br>
<img id="preview">

<script>
let fileSelecionado = null;

const drop = document.getElementById("drop");
const input = document.getElementById("file");

drop.onclick = () => input.click();

input.onchange = (e) => {
  fileSelecionado = e.target.files[0];
};

drop.ondragover = (e) => {
  e.preventDefault();
  drop.style.borderColor = "#00ff88";
};

drop.ondragleave = () => {
  drop.style.borderColor = "#555";
};

drop.ondrop = (e) => {
  e.preventDefault();
  fileSelecionado = e.dataTransfer.files[0];
  drop.style.borderColor = "#555";
};

function criarFigurinha() {
  if (!fileSelecionado) {
    alert("Escolhe ou arrasta uma imagem!");
    return;
  }

  document.getElementById("loading").style.display = "block";

  const img = new Image();
  img.src = URL.createObjectURL(fileSelecionado);

  img.onload = () => {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 512;
    canvas.height = 512;

    const scale = Math.min(512 / img.width, 512 / img.height);
    const x = (512 - img.width * scale) / 2;
    const y = (512 - img.height * scale) / 2;

    // sombra
    ctx.shadowColor = "rgba(0,0,0,0.5)";
    ctx.shadowBlur = 20;

    // desenhar imagem
    ctx.drawImage(img, x, y, img.width * scale, img.height * scale);

    // borda branca estilo figurinha
    ctx.lineWidth = 20;
    ctx.strokeStyle = "white";
    ctx.strokeRect(x, y, img.width * scale, img.height * scale);

    document.getElementById("preview").src = canvas.toDataURL();

    canvas.toBlob((blob) => {
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "figurinha.webp";
      link.click();

      document.getElementById("loading").style.display = "none";
    }, "image/webp");
  };
}
</script>

</body>
</html>
